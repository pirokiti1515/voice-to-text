

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AUDIO TRANSCRIPT</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    /* 深淵な漆黒と、洗練された白・モノトーンのコントラスト */
    --bg: #050508;
    --surface: #0c0c12;
    --surface-glass: rgba(12, 12, 18, 0.7);
    --border: rgba(255, 255, 255, 0.06);
    --border-bright: rgba(255, 255, 255, 0.15);
    --text: #f3f3f5;
    --text-dim: #6e6e7a;
    --accent: #ffffff;
    --accent-glow: rgba(255, 255, 255, 0.12);
    --danger: #ef4444;
  }
  
  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent; 
  }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", sans-serif;
    height: 100dvh;
    max-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    letter-spacing: -0.01em;
  }
  
  /* 浮かんでいるような、ノイズのないミニマムヘッダー */
  header {
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    z-index: 10;
  }
  
  .logo { 
    font-weight: 700;
    font-size: 15px; 
    color: var(--text); 
    letter-spacing: -0.02em; 
  }
  .logo span { 
    color: var(--text-dim); 
    font-size: 12px; 
    margin-left: 0; 
    font-weight: 400; 
    letter-spacing: 0.05em;
  }
  
  /* 動作中のみ存在感を放つ静かなインジケーター */
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); transition: all 0.4s ease; }
  .status-dot.live { background: #fff; box-shadow: 0 0 12px #fff; animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%,100%{opacity:1; transform: scale(1);} 50%{opacity:0.3; transform: scale(0.9);} }
  
  .font-size-control { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-dim); }
  .font-size-control button {
    background: transparent; border: none; color: var(--text-dim);
    width: 28px; height: 28px; cursor: pointer; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s, background 0.2s;
    border-radius: 6px;
  }
  .font-size-control button:active { color: var(--text); background: rgba(255,255,255,0.05); }
  #fontSizeLabel { min-width: 28px; text-align: center; font-weight: 500; }
  
  /* テキストエリアの余白を贅沢に */
  .text-area {
    flex: 1;
    overflow-y: scroll;
    -webkit-overflow-scrolling: touch;
    padding: 40px 28px;
    font-size: var(--font-size, 24px);
    font-weight: 400;
    line-height: 1.65;
    color: var(--text);
    word-break: break-word;
    white-space: pre-wrap;
    overscroll-behavior: contain;
  }
  
  .placeholder { 
    color: var(--text-dim); 
    font-size: 15px; 
    font-weight: 400; 
    text-align: center; 
    margin-top: 100px; 
    line-height: 1.8; 
    letter-spacing: 0.02em;
    opacity: 0.7;
  }
  .interim { color: var(--text-dim); opacity: 0.8; }
  
  /* ガラスのように背景を透過して浮かぶコントロールエリア */
  .controls {
    padding: 20px 28px 36px;
    display: flex; flex-direction: column; gap: 20px;
    border-top: 1px solid var(--border);
    background: var(--surface-glass);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    flex-shrink: 0;
    z-index: 10;
  }
  
  /* 中央に美しく鎮座する正円の録音ボタン */
  .btn-record {
    width: 64px; height: 64px; border: 1px solid var(--border-bright); border-radius: 50%;
    margin: 0 auto; background: var(--surface); color: var(--text);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .btn-record #btnIcon { font-size: 10px; transition: all 0.3s; color: var(--text); }
  .btn-record #btnLabel { display: none; } /* テキストを隠してアイコンのみのミニマルに */
  
  /* 録音中の美しい呼吸アニメーション */
  .btn-record.recording { 
    background: var(--text); 
    border-color: var(--text);
  }
  .btn-record.recording #btnIcon { color: var(--bg); transform: scale(1.1); }
  .btn-record.recording::after {
    content: ''; position: absolute; inset: -1px; border: 1px solid var(--text); border-radius: 50%;
    animation: rec-pulse-glow 2s cubic-bezier(0.16, 1, 0.3, 1) infinite;
  }
  @keyframes rec-pulse-glow { 0%{transform:scale(1); opacity:0.5;} 100%{transform:scale(1.4); opacity:0;} }
  .btn-record:active { transform: scale(0.95); }
  
  /* ボタンという概念を排した、フラットなメニューリンク風UI */
  .sub-controls { display: flex; gap: 6px; justify-content: space-between; }
  .btn-sub {
    flex: 1; padding: 10px 2px; border: none; border-radius: 6px;
    background: transparent; color: var(--text-dim); font-size: 12px; font-weight: 500;
    font-family: inherit; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .btn-sub:active, .btn-sub:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .btn-sub.highlight { color: var(--text-dim); }
  .btn-sub.highlight:hover { color: var(--text); }
  
  /* 中央に静かに浮かび上がる洗練されたモーダル */
  .modal-overlay, .history-overlay, .history-detail-overlay {
    position: fixed; inset: 0; background: rgba(3,3,5,0.75); z-index: 100;
    display: none; align-items: center; justify-content: center; padding: 24px;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .modal-overlay.open, .history-overlay.open, .history-detail-overlay.open { display: flex; }
  
  .modal, .history-modal, .history-detail-modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    width: 100%; max-width: 540px; max-height: 75dvh;
    display: flex; flex-direction: column; 
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    animation: modal-appear 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes modal-appear { from{transform:scale(0.96); opacity: 0;} to{transform:scale(1); opacity: 1;} }
  
  .modal-header, .history-header {
    padding: 20px 24px 16px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .modal-title, .history-title { font-size: 14px; font-weight: 600; color: var(--text); uppercase; letter-spacing: 0.05em; }
  
  .modal-close { 
    background: transparent; border: none; color: var(--text-dim); 
    width: 24px; height: 24px; font-size: 14px; cursor: pointer; 
    display: flex; align-items: center; justify-content: center; transition: color 0.2s;
  }
  .modal-close:hover { color: var(--text); }
  
  .modal-body { flex: 1; overflow-y: auto; padding: 24px; font-size: 15px; line-height: 1.65; color: var(--text); -webkit-overflow-scrolling: touch; }
  
  .modal-footer { padding: 16px 24px 20px; display: flex; gap: 8px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .modal-footer button { 
    flex: 1; padding: 12px; border-radius: 6px; font-size: 13px; font-family: inherit; 
    cursor: pointer; border: none; font-weight: 500; transition: all 0.2s; 
  }
  .btn-print { background: rgba(255,255,255,0.04); color: var(--text-dim); border: 1px solid var(--border); }
  .btn-print:hover { color: var(--text); background: rgba(255,255,255,0.08); }
  .btn-save-summary { background: var(--text); color: var(--bg); font-weight: 600; }
  .btn-save-summary:hover { opacity: 0.9; }
  
  /* 履歴周りのインダストリアルデザイン */
  .history-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .history-empty { text-align: center; padding: 80px 24px; color: var(--text-dim); font-size: 14px; line-height: 1.6; }
  
  .history-toolbar {
    display: flex; gap: 10px; padding: 12px 24px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .history-toolbar button {
    padding: 6px 12px; border-radius: 4px; border: none; font-size: 12px;
    font-family: inherit; cursor: pointer; font-weight: 500; background: transparent; transition: all 0.2s;
  }
  .btn-delete-selected { color: var(--danger); }
  .btn-delete-selected:hover { background: rgba(239,68,68,0.08); }
  .btn-delete-all { color: var(--text-dim); margin-left: auto; }
  .btn-delete-all:hover { color: var(--danger); }
  
  .history-item { 
    position: relative; display: flex; align-items: center; gap: 16px; 
    border-bottom: 1px solid var(--border); padding: 18px 24px; cursor: pointer;
    transition: background 0.2s;
  }
  .history-item:hover { background: rgba(255,255,255,0.02); }
  .history-item input[type=checkbox] {
    width: 16px; height: 16px; flex-shrink: 0;
    accent-color: var(--text); cursor: pointer;
    border: 1px solid var(--border-bright);
    background: transparent;
  }
  .history-item-content { flex: 1; min-width: 0; }
  .history-item.selected { background: rgba(255, 255, 255, 0.02); }
  .history-item-date { font-size: 11px; color: var(--text-dim); margin-top: 4px; font-family: 'Space Mono', monospace; }
  
  /* タイトル入力・警告系のミニマムポップアップ */
  .title-modal-overlay, .api-modal-overlay {
    position: fixed; inset: 0; background: rgba(3,3,5,0.8); z-index: 300;
    display: none; align-items: center; justify-content: center; padding: 24px;
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  }
  .title-modal-overlay.open { display: flex; }
  .title-modal, .api-modal-content {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    width: 100%; max-width: 320px; padding: 24px; text-align: left;
    box-shadow: 0 30px 70px rgba(0,0,0,0.6);
    animation: modal-appear 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .title-modal h3, .api-modal-content h2 { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .title-modal p, .api-modal-content p { font-size: 12px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.5; }
  .title-modal input, .api-modal-content input {
    width: 100%; background: var(--bg); border: 1px solid var(--border-bright);
    border-radius: 6px; padding: 10px 14px; color: var(--text); font-size: 14px;
    font-family: inherit; margin-bottom: 20px; transition: border-color 0.2s;
  }
  .title-modal input:focus, .api-modal-content input:focus { outline: none; border-color: var(--text); }
  
  .title-modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .title-modal-btns button {
    padding: 10px 16px; border-radius: 6px; border: none; font-size: 13px;
    font-family: inherit; cursor: pointer; font-weight: 500; transition: all 0.2s;
  }
  .btn-title-cancel { background: transparent; color: var(--text-dim); }
  .btn-title-cancel:hover { color: var(--text); }
  .btn-title-save { background: var(--text); color: var(--bg); font-weight: 600; }
  
  .loading-dots { display: flex; gap: 4px; justify-content: center; padding: 16px; }
  .loading-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--text); animation: dot-bounce 1.2s infinite both; }
  .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes dot-bounce { 0%,80%,100%{transform:scale(0.8);opacity:0.2} 40%{transform:scale(1);opacity:1} }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo"><span>AUDIO TRANSCRIPT</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <div class="font-size-control">
      <button onclick="changeFontSize(-1)">−</button>
      <span id="fontSizeLabel">中</span>
      <button onclick="changeFontSize(1)">+</button>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>
</header>

<div class="text-area" id="textArea">
  <div class="placeholder" id="placeholder">READY TO RECORD<br><br>下のボタンを押して話しかけてください</div>
</div>

<div class="controls">
  <button class="btn-record" id="btnRecord" onclick="toggleRecording()">
    <span id="btnIcon" style="transform: rotate(90deg); margin-left: 2px;">▲</span>
    <span id="btnLabel">録音開始</span>
  </button>
  <div class="sub-controls">
    <button class="btn-sub highlight" onclick="copyText()">テキストコピー</button>
    <button class="btn-sub highlight" onclick="copyTextMeeting()">議事録用</button>
    <button class="btn-sub highlight" onclick="saveTranscript()" id="btnSaveTranscript">保存</button>
    <button class="btn-sub" onclick="clearText()">クリア</button>
    <button class="btn-sub highlight" onclick="openHistory()">履歴一覧</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">SUMMARY</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
    <div class="modal-footer">
      <button class="btn-save-summary" onclick="saveSummary()" id="btnSaveSummary">保存</button>
      <button class="btn-print" onclick="copySummary()" id="btnCopySummary">コピー</button>
      <button class="btn-print" onclick="printSummary()">印刷</button>
    </div>
  </div>
</div>

<div class="history-overlay" id="historyOverlay">
  <div class="history-modal">
    <div class="history-header">
      <div class="history-title">HISTORY</div>
      <button class="modal-close" onclick="closeHistory()">✕</button>
    </div>
    <div class="history-body" id="historyBody"></div>
  </div>
</div>

<div class="history-detail-overlay" id="historyDetailOverlay">
  <div class="history-detail-modal">
    <div class="modal-header">
      <div class="modal-title" id="historyDetailDate"></div>
      <button class="modal-close" onclick="closeHistoryDetail()">✕</button>
    </div>
    <div class="modal-body" id="historyDetailBody" contenteditable="true" style="cursor:text" oninput="onHistoryDetailEdit()"></div>
    <div class="modal-footer">
      <button class="btn-print" onclick="saveHistoryDetailEdit()" id="btnSaveHistoryEdit">💾 上書き保存</button>
      <button class="btn-print" onclick="copyHistoryDetail()">コピー</button>
      <button class="btn-print" onclick="copyHistoryDetailMeeting()">議事録用</button>
      <button class="btn-print" onclick="printHistoryDetail()">印刷</button>
    </div>
  </div>
</div>

<div class="api-modal-overlay" id="apiModalOverlay">
  <div class="api-modal-content">
    <h2>API KEY REQUIRED</h2>
    <p>要約機能を使用するにはAnthropicのAPIキーを入力してください。</p>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." autocomplete="off">
    <div class="title-modal-btns">
      <button class="btn-title-save" onclick="saveApiKey()" style="width: 100%;">保存して要約を実行</button>
    </div>
  </div>
</div>

<div class="title-modal-overlay" id="titleModalOverlay">
  <div class="title-modal">
    <h3 id="titleModalHeading">保存タイトル</h3>
    <p>省略した場合は日時がタイトルになります</p>
    <input type="text" id="titleInput" placeholder="タイトルを入力" maxlength="30">
    <div class="title-modal-btns">
      <button class="btn-title-cancel" onclick="closeTitleModal()">キャンセル</button>
      <button class="btn-title-save" onclick="confirmSave()">保存</button>
    </div>
  </div>
</div>

<script>
/* --- ロジック部分はオリジナルの仕様を完全保護 --- */
function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key || !key.startsWith('sk-')) {
    alert('正しいAPIキーを入力してください');
    return;
  }
  localStorage.setItem('anthropic_api_key', key);
  document.getElementById('apiModalOverlay').style.display = 'none';
  openSummary();
}

function getApiKey() {
  return localStorage.getItem('anthropic_api_key') || '';
}

const FONT_SIZES = [16, 20, 24, 30, 36, 44];
const FONT_LABELS = ['極小','小','中','大','特大','最大'];
let fontIndex = 2; 
document.documentElement.style.setProperty('--font-size', FONT_SIZES[fontIndex] + 'px');
document.getElementById('fontSizeLabel').textContent = FONT_LABELS[fontIndex];

function changeFontSize(delta) {
  fontIndex = Math.max(0, Math.min(FONT_SIZES.length - 1, fontIndex + delta));
  document.documentElement.style.setProperty('--font-size', FONT_SIZES[fontIndex] + 'px');
  document.getElementById('fontSizeLabel').textContent = FONT_LABELS[fontIndex];
}

let recognition = null;
let isRecording = false;
let finalText = '';
let recordingStartTime = null;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  document.getElementById('textArea').innerHTML = '<div class="placeholder">⚠️ 音声認識非対応のブラウザです<br><br>Chrome または Safari をお使いください</div>';
  document.getElementById('btnRecord').disabled = true;
}

function toggleRecording() {
  if (!SpeechRecognition) return;
  isRecording ? stopRecording() : startRecording();
}

let scrollInterval = null;

function startRecording() {
  recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isRecording = true;
    if (!recordingStartTime) recordingStartTime = new Date();
    document.getElementById('textArea').contentEditable = 'false';
    document.getElementById('textArea').style.cursor = 'default';
    document.getElementById('btnRecord').classList.add('recording');
    document.getElementById('btnIcon').textContent = '■';
    document.getElementById('btnIcon').style.transform = 'none';
    document.getElementById('btnIcon').style.marginLeft = '0';
    document.getElementById('btnLabel').textContent = '録音停止';
    document.getElementById('statusDot').classList.add('live');
    const ph = document.getElementById('placeholder');
    if (ph) ph.style.display = 'none';
    const area = document.getElementById('textArea');
    let userScrolling = false;
    let userScrollTimer = null;
    area.addEventListener('wheel', () => {
      userScrolling = true;
      clearTimeout(userScrollTimer);
      userScrollTimer = setTimeout(() => { userScrolling = false; }, 3000);
    });
    area.addEventListener('touchmove', () => {
      userScrolling = true;
      clearTimeout(userScrollTimer);
      userScrollTimer = setTimeout(() => { userScrolling = false; }, 3000);
    });
    scrollInterval = setInterval(() => {
      if (userScrolling) return;
      area.scrollTop = area.scrollHeight;
    }, 200);
  };

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        const t = e.results[i][0].transcript.trim();
        if (t) {
          finalText += t.replace(/。/g, '。\n').replace(/！/g, '！\n').replace(/？/g, '？\n') + '\n';
        }
      }
      else interim += e.results[i][0].transcript;
    }
    renderText(interim);
  };

  recognition.onerror = (e) => { if (e.error !== 'aborted') console.error(e.error); };
  recognition.onend = () => { if (isRecording) recognition.start(); };
  recognition.start();
}

function stopRecording() {
  isRecording = false;
  if (scrollInterval) { clearInterval(scrollInterval); scrollInterval = null; }
  if (recognition) recognition.stop();
  document.getElementById('btnRecord').classList.remove('recording');
  document.getElementById('btnIcon').textContent = '▲';
  document.getElementById('btnIcon').style.transform = 'rotate(90deg)';
  document.getElementById('btnIcon').style.marginLeft = '2px';
  document.getElementById('btnLabel').textContent = '録音開始';
  document.getElementById('statusDot').classList.remove('live');
  renderText('');
  // 録音停止後はテキストエリアを編集可能に
  const area = document.getElementById('textArea');
  area.contentEditable = 'true';
  area.style.cursor = 'text';
  area.addEventListener('input', () => { finalText = area.innerText; });
}

function renderText(interim) {
  const area = document.getElementById('textArea');
  area.innerHTML = '';
  if (finalText) {
    const s = document.createElement('span');
    s.style.whiteSpace = 'pre-wrap';
    s.textContent = finalText;
    area.appendChild(s);
  }
  if (interim) {
    const s = document.createElement('span');
    s.className = 'interim';
    s.textContent = interim;
    area.appendChild(s);
  }
  if (!finalText && !interim) {
    area.innerHTML = '<div class="placeholder" id="placeholder">READY TO RECORD<br><br>下のボタンを押して話しかけてください</div>';
  }
  if (isRecording) {
    setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
  }
}

function clearText() {
  if (!confirm('テキストをクリアしますか？')) return;
  finalText = '';
  recordingStartTime = null;
  renderText('');
}

const MEETING_PROMPT = `以下は会議の音声文字起こしです。以下の項目を必ず含めて要約してください。

【決定事項】
・何が決まったか

【タスク・依頼】
・誰が・何を・いつまでに

【次回の約束・期限】
・日付や締め切りが出てきたものをすべて

【未解決の問題】
・結論が出なかった課題

【確認事項】
・後で確認が必要なこと

【次回の議題】
・次回話し合う予定のこと

【問題・困っていること】
・メンバーが抱えている問題や困りごと

【その他の重要事項】
・見落としてはいけないこと

【会議内容】
`;

function copyText() {
  if (!finalText.trim()) { alert('コピーする文章がありません'); return; }
  navigator.clipboard.writeText(finalText).then(() => alert('コピーしました！')).catch(() => prompt('コピーしてください：', finalText));
}

function copyTextMeeting() {
  if (!finalText.trim()) { alert('コピーする文章がありません'); return; }
  const now = new Date();
  const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
  const dateStr = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日（' + weekdays[now.getDay()] + '）';
  const datePrompt = `この会議は${dateStr}に行われました。「今日」「明日」「来週」「今週中」などの相対的な表現は、基準日から各曜日までの日数を計算してから「○月○日（曜日）」の形式で具体的な日付に変換してください。\n\n作業予定表の画像が添付されている場合は、誰がどのタスク番号を担当しているかの参照用として使ってください。予定表の内容そのものは要約せず、会議の文字起こしの要約に担当者とタスク情報を補完するためだけに活用してください。\n\nマークダウン形式で出力してください。\n\n`;
  const textToCopy = datePrompt + MEETING_PROMPT + finalText;
  navigator.clipboard.writeText(textToCopy).then(() => alert('議事録用にコピーしました！')).catch(() => prompt('コピーしてください：', textToCopy));
}

async function openSummary() {
  if (!finalText.trim()) { alert('録音してから要約ボタンを押してください'); return; }
  if (!getApiKey()) {
    document.getElementById('apiModalOverlay').style.display = 'flex';
    return;
  }

  document.getElementById('modalBody').innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div><p style="text-align:center;color:var(--text-dim);font-size:12px;margin-top:12px;letter-spacing:0.05em">ANALYZING WITH AI...</p>';
  document.getElementById('modalOverlay').classList.add('open');

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': getApiKey(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: '以下は音声文字変換された会話内容です。耳の不自由な方に見せるために、以下の形式でわかりやすく要約してください。\n\n【形式】\n・各ポイントは必ず改行して1行ずつ書く\n・重要なポイントを3〜5点、箇条書きで\n・各項目の先頭に「▸ 」をつける\n・項目と項目の間は1行あける\n・難しい言葉は使わず、シンプルな日本語で\n\n【会話内容】\n' + finalText
        }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API Error ' + response.status);
    }

    const data = await response.json();
    const summary = data.content[0].text;
    const items = summary.match(/^[▸・\-]\s*.+$/gm) || [];
    if (items.length > 0) {
      const html = '<div style="background:rgba(255,255,255,0.01);border:1px solid var(--border);border-radius:8px;padding:20px">'
        + items.map(line => {
            const text = line.replace(/^[▸・\-]\s*/, '').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            return '<div style="display:flex;gap:12px;align-items:flex-start;padding:10px 0">'
              + '<div style="width:4px;height:4px;border-radius:50%;background:var(--text);flex-shrink:0;margin-top:8px"></div>'
              + '<div style="font-size:15px;line-height:1.6;color:var(--text)">' + text + '</div>'
              + '</div>';
          }).join('')
        + '</div>';
      document.getElementById('modalBody').innerHTML = html;
    } else {
      document.getElementById('modalBody').innerHTML = summary.replace(/\n/g, '<br>');
    }
  } catch (err) {
    document.getElementById('modalBody').innerHTML = '<p style="color:var(--danger)">❌ エラー: ' + err.message + '</p>';
  }
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

let currentSummaryText = '';
let currentSummaryHTML = '';

function saveSummary() {
  const body = document.getElementById('modalBody');
  const text = body.innerText;
  if (!text.trim() || text.includes('ANALYZING')) return;
  pendingSaveType = 'summary';
  document.getElementById('titleModalHeading').textContent = '要約を保存';
  document.getElementById('titleInput').value = '';
  document.getElementById('titleModalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('titleInput').focus(), 100);
}

let pendingSaveType = '';

function saveTranscript() {
  if (!finalText.trim()) { alert('保存する文章がありません'); return; }
  pendingSaveType = 'transcript';
  document.getElementById('titleModalHeading').textContent = '文字起こしを保存';
  document.getElementById('titleInput').value = '';
  document.getElementById('titleModalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('titleInput').focus(), 100);
  document.getElementById('titleInput').onkeydown = (e) => { if (e.key === 'Enter') confirmSave(); };
}

function closeTitleModal() {
  document.getElementById('titleModalOverlay').classList.remove('open');
  pendingSaveType = '';
}

function confirmSave() {
  const title = document.getElementById('titleInput').value.trim();
  document.getElementById('titleModalOverlay').classList.remove('open');

  if (pendingSaveType === 'transcript') {
    const history = JSON.parse(localStorage.getItem('transcript_history') || '[]');
    const now = new Date();
    const startDate = recordingStartTime || now;
    const dateStr = startDate.getFullYear() + '年' + (startDate.getMonth()+1) + '月' + startDate.getDate() + '日 '
      + startDate.getHours() + ':' + String(startDate.getMinutes()).padStart(2,'0');
    history.unshift({ date: dateStr, title: title, text: finalText, id: Date.now() });
    if (history.length > 200) history.pop();
    localStorage.setItem('transcript_history', JSON.stringify(history));
    const btn = document.getElementById('btnSaveTranscript');
    btn.textContent = '保存完了';
    setTimeout(() => { btn.textContent = '保存'; }, 2000);
  } else if (pendingSaveType === 'summary') {
    const body = document.getElementById('modalBody');
    const html = body.innerHTML;
    const text = body.innerText;
    if (!text.trim()) return;
    const history = JSON.parse(localStorage.getItem('summary_history') || '[]');
    const now = new Date();
    const dateStr = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 '
      + now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
    history.unshift({ date: dateStr, title: title, html: html, text: text, id: Date.now() });
    if (history.length > 200) history.pop();
    localStorage.setItem('summary_history', JSON.stringify(history));
    const btn = document.getElementById('btnSaveSummary');
    btn.textContent = '保存完了';
    setTimeout(() => { btn.textContent = '保存'; }, 2000);
  }
  pendingSaveType = '';
}

function renderHistoryList() {
  const storageKey = 'transcript_history';
  const history = JSON.parse(localStorage.getItem(storageKey) || '[]');
  const emptyMsg = '保存されたログはありません。<br><br>メイン画面で「保存」を押すと<br>ここにアーカイブされます。';

  const body = document.getElementById('historyBody');

  if (history.length === 0) {
    body.innerHTML = '<div class="history-empty">' + emptyMsg + '</div>';
    return;
  }

  const openFn = 'openTranscriptDetail';

  body.innerHTML = `
    <div class="history-toolbar">
      <button class="btn-delete-selected" onclick="deleteSelected('${storageKey}')">選択削除</button>
      <button class="btn-delete-all" onclick="deleteAll('${storageKey}')">すべて削除</button>
    </div>
  ` + history.map(item => `
    <div class="history-item" id="item-${item.id}">
      <input type="checkbox" id="chk-${item.id}" onclick="event.stopPropagation()" onchange="updateItemStyle(${item.id})">
      <div class="history-item-content" onclick="${openFn}(${item.id})">
        <div style="font-size:15px;font-weight:500;color:var(--text);line-height:1.4">${item.title || 'UNTITLED LOG'}</div>
        <div class="history-item-date">${item.date}</div>
      </div>
    </div>
  `).join('');
}

function updateItemStyle(id) {
  const chk = document.getElementById('chk-' + id);
  const item = document.getElementById('item-' + id);
  item.classList.toggle('selected', chk.checked);
}


function deleteSelected(storageKey) {
  const history = JSON.parse(localStorage.getItem(storageKey) || '[]');
  const selected = history.filter(item => {
    const chk = document.getElementById('chk-' + item.id);
    return chk && chk.checked;
  });
  if (selected.length === 0) { alert('削除する項目を選択してください'); return; }
  if (!confirm(selected.length + '件を削除しますか？')) return;
  const remaining = history.filter(item => {
    const chk = document.getElementById('chk-' + item.id);
    return !(chk && chk.checked);
  });
  localStorage.setItem(storageKey, JSON.stringify(remaining));
  renderHistoryList();
}

function deleteAll(storageKey) {
  const history = JSON.parse(localStorage.getItem(storageKey) || '[]');
  if (history.length === 0) return;
  if (!confirm('すべての履歴を完全に削除しますか？')) return;
  localStorage.setItem(storageKey, JSON.stringify([]));
  renderHistoryList();
}

let currentSummaryDate = '';

let currentHistoryId = null;

function onHistoryDetailEdit() {
  const btn = document.getElementById('btnSaveHistoryEdit');
  btn.style.color = 'var(--text)';
  btn.style.background = 'rgba(255,255,255,0.1)';
}

function saveHistoryDetailEdit() {
  if (!currentHistoryId) return;
  const body = document.getElementById('historyDetailBody');
  const newText = body.innerText;
  const history = JSON.parse(localStorage.getItem('transcript_history') || '[]');
  const idx = history.findIndex(h => h.id === currentHistoryId);
  if (idx !== -1) {
    history[idx].text = newText;
    localStorage.setItem('transcript_history', JSON.stringify(history));
    currentSummaryText = newText;
    const btn = document.getElementById('btnSaveHistoryEdit');
    btn.textContent = '✅ 保存しました';
    btn.style.color = '';
    btn.style.background = '';
    setTimeout(() => { btn.textContent = '💾 上書き保存'; }, 2000);
  }
}

function openTranscriptDetail(id) {
  const history = JSON.parse(localStorage.getItem('transcript_history') || '[]');
  const item = history.find(h => h.id === id);
  if (!item) return;
  currentHistoryId = id;
  currentSummaryText = item.text;
  currentSummaryDate = item.date;
  currentSummaryHTML = '<pre style="white-space:pre-wrap;font-family:inherit;font-size:15px;line-height:1.7;color:var(--text);">' + item.text + '</pre>';
  document.getElementById('historyDetailDate').textContent = item.title ? item.title.toUpperCase() : 'ARCHIVE';
  document.getElementById('historyDetailBody').innerHTML = currentSummaryHTML;
  document.getElementById('historyDetailOverlay').classList.add('open');
}

function openHistory() {
  renderHistoryList();
  document.getElementById('historyOverlay').classList.add('open');
}

function closeHistory() {
  document.getElementById('historyOverlay').classList.remove('open');
}

function closeHistoryDetail() {
  document.getElementById('historyDetailOverlay').classList.remove('open');
}

function copyHistoryDetail() {
  navigator.clipboard.writeText(currentSummaryText).then(() => alert('コピーしました！')).catch(() => prompt('コピーしてください：', currentSummaryText));
}

function copyHistoryDetailMeeting() {
  let dateStr = currentSummaryDate;
  try {
    const match = currentSummaryDate.match(/(\d+)年(\d+)月(\d+)日/);
    if (match) {
      const d = new Date(match[1], match[2]-1, match[3]);
      const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
      dateStr = match[1] + '年' + match[2] + '月' + match[3] + '日（' + weekdays[d.getDay()] + '）';
    }
  } catch(e) {}
  const datePrompt = `この会議は${dateStr}に行われました。「今日」「明日」「来週」「今週中」などの相対的な表現は、基準日から各曜日までの日数を計算してから「○月○日（曜日）」の形式で具体的な日付に変換してください。\n\n作業予定表の画像が添付されている場合は、誰がどのタスク番号を担当しているかの参照用として使ってください。予定表の内容そのものは要約せず、会議の文字起こしの要約に担当者とタスク情報を補完するためだけに活用してください。\n\nマークダウン形式で出力してください。\n\n`;
  const textToCopy = datePrompt + MEETING_PROMPT + currentSummaryText;
  navigator.clipboard.writeText(textToCopy).then(() => alert('議事録用にコピーしました！')).catch(() => prompt('コピーしてください：', textToCopy));
}

function printHistoryDetail() {
  const w = window.open('', '_blank');
  w.document.write('<html><head><title>会話要約</title><meta charset="UTF-8"><style>body{font-family:sans-serif;padding:32px;font-size:16px;line-height:1.8}</style></head><body>' + currentSummaryHTML + '</body></html>');
  w.document.close(); w.print();
}

function copySummary() {
  const body = document.getElementById('modalBody');
  const text = body.innerText;
  if (!text.trim()) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btnCopySummary');
    btn.textContent = 'コピー完了';
    setTimeout(() => { btn.textContent = 'コピー'; }, 2000);
  }).catch(() => prompt('コピーしてください：', text));
}

function printSummary() {
  const w = window.open('', '_blank');
  const printStyle = '<style>body{font-family:sans-serif;padding:40px;background:#fff;color:#222}div{font-size:16px;line-height:1.7}strong{font-weight:700;color:#222}[style*="border-radius:16px"]{background:#fff!important;padding:0!important}[style*="border-radius:50%"]{background:#222!important}</style>';
  w.document.write('<html><head><title>会話要約</title><meta charset="UTF-8">' + printStyle + '</head><body>' + document.getElementById('modalBody').innerHTML + '</body></html>');
  w.document.close(); w.print();
}
