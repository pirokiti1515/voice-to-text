
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>声文字 - 音声文字変換</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #00e5ff;
    --text: #f0f0f5;
    --text-dim: #5a5a7a;
    --danger: #ff4466;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    height: 100dvh;
    max-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    padding: 12px 20px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .logo { font-family: 'Space Mono', monospace; font-size: 18px; color: var(--accent); letter-spacing: -1px; }
  .logo span { color: var(--text-dim); font-size: 12px; margin-left: 8px; font-family: 'Noto Sans JP'; font-weight: 300; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--text-dim); transition: all 0.3s; }
  .status-dot.live { background: var(--danger); box-shadow: 0 0 8px var(--danger); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .font-size-control { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-dim); }
  .font-size-control button {
    background: var(--border); border: none; color: var(--text);
    width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .text-area {
    flex: 1;
    overflow-y: scroll;
    -webkit-overflow-scrolling: touch;
    padding: 24px 20px 32px;
    font-size: var(--font-size, 24px);
    line-height: 1.7;
    color: var(--text);
    word-break: break-word;
    white-space: pre-wrap;
    overscroll-behavior: contain;
  }
  .placeholder { color: var(--text-dim); font-size: 16px; font-weight: 300; text-align: center; margin-top: 40px; line-height: 2; }
  .interim { color: var(--text-dim); font-style: italic; }
  .controls {
    padding: 12px 16px 20px;
    display: flex; flex-direction: column; gap: 10px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .btn-record {
    width: 100%; padding: 14px; border: none; border-radius: 14px;
    font-size: 16px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    gap: 10px; transition: all 0.2s; background: var(--accent); color: #000;
  }
  .btn-record.recording { background: var(--danger); color: #fff; animation: rec-pulse 1.5s infinite; }
  @keyframes rec-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,68,102,0.4)} 50%{box-shadow:0 0 0 12px rgba(255,68,102,0)} }
  .btn-record:active { transform: scale(0.97); }
  .sub-controls { display: flex; gap: 10px; }
  .btn-sub {
    flex: 1; padding: 12px 8px; border: 1px solid var(--border); border-radius: 10px;
    background: transparent; color: var(--text-dim); font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s;
  }
  .btn-sub:active { background: var(--border); color: var(--text); }
  .btn-sub.highlight { border-color: #7c3aed; color: var(--accent); }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100;
    display: none; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 20px 20px 0 0; border-top: 1px solid var(--border);
    width: 100%; max-width: 640px; max-height: 70dvh;
    display: flex; flex-direction: column; animation: slide-up 0.3s ease;
  }
  @keyframes slide-up { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-header {
    padding: 20px 20px 16px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .modal-title { font-size: 16px; font-weight: 700; color: var(--accent); }
  .modal-close { background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer; padding: 4px; }
  .modal-body { flex: 1; overflow-y: auto; padding: 20px; font-size: 15px; line-height: 1.8; color: var(--text); -webkit-overflow-scrolling: touch; }
  .modal-footer { padding: 16px 20px 28px; display: flex; gap: 10px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .modal-footer button { flex: 1; padding: 12px; border-radius: 10px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; border: none; font-weight: 700; }
  .btn-print { background: var(--border); color: var(--text); }
  .btn-save-summary { background: var(--accent); color: #000; }
  .btn-save-summary:active { opacity: 0.8; }
  .history-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 150;
    display: none; align-items: flex-end; justify-content: center;
  }
  .history-overlay.open { display: flex; }
  .history-modal {
    background: var(--surface); border-radius: 20px 20px 0 0; border-top: 1px solid var(--border);
    width: 100%; max-width: 640px; max-height: 80dvh;
    display: flex; flex-direction: column; animation: slide-up 0.3s ease;
  }
  .history-header {
    padding: 20px 20px 16px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .history-title { font-size: 16px; font-weight: 700; color: var(--accent); }
  .history-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .history-empty { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 14px; line-height: 2; }
  .history-toolbar {
    display: flex; gap: 8px; padding: 10px 16px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .history-toolbar button {
    padding: 7px 12px; border-radius: 8px; border: none; font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif; cursor: pointer; font-weight: 700;
  }
  .btn-select-all { background: var(--border); color: var(--text); }
  .btn-delete-selected { background: var(--danger); color: #fff; }
  .btn-delete-all { background: transparent; color: var(--danger); border: 1px solid var(--danger) !important; margin-left: auto; }
  .history-item { position: relative; display: flex; align-items: flex-start; gap: 12px; }
  .history-item input[type=checkbox] {
    width: 18px; height: 18px; flex-shrink: 0; margin-top: 4px;
    accent-color: var(--accent); cursor: pointer;
  }
  .history-item-content { flex: 1; min-width: 0; }
  .history-item.selected { background: rgba(0,229,255,0.05); }
  .history-item {
    border-bottom: 1px solid var(--border); padding: 16px 20px; cursor: pointer;
    transition: background 0.15s;
  }
  .history-item:active { background: var(--border); }
  .history-item-date { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
  .history-item-preview { font-size: 14px; color: var(--text); line-height: 1.5; }
  .history-item-del {
    float: right; background: none; border: none; color: var(--text-dim);
    font-size: 18px; cursor: pointer; padding: 0 0 0 12px; line-height: 1;
  }
  .history-detail-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 200;
    display: none; align-items: flex-end; justify-content: center;
  }
  .history-detail-overlay.open { display: flex; }
  .history-detail-modal {
    background: var(--surface); border-radius: 20px 20px 0 0; border-top: 1px solid var(--border);
    width: 100%; max-width: 640px; max-height: 80dvh;
    display: flex; flex-direction: column; animation: slide-up 0.3s ease;
  }
  .title-modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300;
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .title-modal-overlay.open { display: flex; }
  .title-modal {
    background: var(--surface); border-radius: 16px; border: 1px solid var(--border);
    width: 100%; max-width: 400px; padding: 24px;
  }
  .title-modal h3 { font-size: 15px; color: var(--accent); margin-bottom: 8px; }
  .title-modal p { font-size: 12px; color: var(--text-dim); margin-bottom: 16px; }
  .title-modal input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; color: var(--text); font-size: 15px;
    font-family: 'Noto Sans JP', sans-serif; margin-bottom: 12px;
  }
  .title-modal input:focus { outline: none; border-color: var(--accent); }
  .title-modal-btns { display: flex; gap: 10px; }
  .title-modal-btns button {
    flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif; cursor: pointer; font-weight: 700;
  }
  .btn-title-save { background: var(--accent); color: #000; }
  .btn-title-cancel { background: var(--border); color: var(--text); }
  .loading-dots { display: flex; gap: 6px; justify-content: center; padding: 20px; }
  .loading-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: dot-bounce 1.2s infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot-bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.3} 40%{transform:scale(1);opacity:1} }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">声文字 <span>音声文字変換</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="font-size-control">
      <button onclick="changeFontSize(-1)">－</button>
      <span id="fontSizeLabel">大</span>
      <button onclick="changeFontSize(1)">＋</button>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>
</header>

<div class="text-area" id="textArea">
  <div class="placeholder" id="placeholder">録音開始を押して<br>話しかけてください</div>
</div>

<div class="controls">
  <button class="btn-record" id="btnRecord" onclick="toggleRecording()">
    <span id="btnIcon">🎙️</span>
    <span id="btnLabel">録音開始</span>
  </button>
  <div class="sub-controls">
    <button class="btn-sub highlight" onclick="copyText()">📋 コピー</button>
    <button class="btn-sub highlight" onclick="saveTranscript()" id="btnSaveTranscript">💾 保存</button>
    <button class="btn-sub" onclick="clearText()">🗑️ クリア</button>
    <button class="btn-sub highlight" onclick="openHistory()">📚 履歴</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">✨ 会話の要約</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
    <div class="modal-footer">
      <button class="btn-save-summary" onclick="saveSummary()" id="btnSaveSummary">💾 保存</button>
      <button class="btn-print" onclick="copySummary()" id="btnCopySummary">📋 コピー</button>
      <button class="btn-print" onclick="printSummary()">🖨️ 印刷する</button>
    </div>
  </div>
</div>

<!-- 履歴一覧モーダル -->
<div class="history-overlay" id="historyOverlay">
  <div class="history-modal">
    <div class="history-header">
      <div class="history-title">📚 履歴</div>
      <button class="modal-close" onclick="closeHistory()">✕</button>
    </div>
    <div style="display:flex;border-bottom:1px solid #1e1e2e;flex-shrink:0">
      <button id="tabTranscript" onclick="switchTab('transcript')" style="flex:1;padding:12px;background:none;border:none;color:#00e5ff;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;border-bottom:2px solid #00e5ff;cursor:pointer">📝 文字起こし</button>
      <button id="tabSummary" onclick="switchTab('summary')" style="flex:1;padding:12px;background:none;border:none;color:#5a5a7a;font-family:'Noto Sans JP',sans-serif;font-size:14px;cursor:pointer">✨ 要約</button>
    </div>
    <div class="history-body" id="historyBody"></div>
  </div>
</div>

<!-- 履歴詳細モーダル -->
<div class="history-detail-overlay" id="historyDetailOverlay">
  <div class="history-detail-modal">
    <div class="modal-header">
      <div class="modal-title" id="historyDetailDate"></div>
      <button class="modal-close" onclick="closeHistoryDetail()">✕</button>
    </div>
    <div class="modal-body" id="historyDetailBody"></div>
    <div class="modal-footer">
      <button class="btn-print" onclick="copyHistoryDetail()">📋 コピー</button>
      <button class="btn-print" onclick="printHistoryDetail()">🖨️ 印刷する</button>
    </div>
  </div>
</div>

<!-- APIキー入力モーダル -->
<div class="api-modal-overlay" id="apiModalOverlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:400;display:none;align-items:center;justify-content:center;padding:20px">
  <div style="background:#13131a;border-radius:16px;border:1px solid #1e1e2e;width:100%;max-width:400px;padding:24px">
    <h2 style="font-size:16px;color:#00e5ff;margin-bottom:8px">🔑 APIキーを設定</h2>
    <p style="font-size:13px;color:#5a5a7a;margin-bottom:16px;line-height:1.6">要約機能を使うにはAnthropicのAPIキーが必要です。<br>一度入力すればこのブラウザに保存されます。</p>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." autocomplete="off"
      style="width:100%;background:#0a0a0f;border:1px solid #1e1e2e;border-radius:8px;padding:12px;color:#f0f0f5;font-size:13px;font-family:monospace;margin-bottom:16px">
    <button onclick="saveApiKey()" style="width:100%;padding:14px;background:#00e5ff;color:#000;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer">保存して要約する</button>
  </div>
</div>

<!-- タイトル入力モーダル -->
<div class="title-modal-overlay" id="titleModalOverlay">
  <div class="title-modal">
    <h3 id="titleModalHeading">💾 タイトルをつけて保存</h3>
    <p>省略するとタイトルなしで保存されます</p>
    <input type="text" id="titleInput" placeholder="例：〇〇さんとの打ち合わせ" maxlength="30">
    <div class="title-modal-btns">
      <button class="btn-title-cancel" onclick="closeTitleModal()">キャンセル</button>
      <button class="btn-title-save" onclick="confirmSave()">保存する</button>
    </div>
  </div>
</div>

<script>
function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key || !key.startsWith('sk-')) {
    alert('正しいAPIキーを入力してください（sk- から始まります）');
    return;
  }
  localStorage.setItem('anthropic_api_key', key);
  document.getElementById('apiModalOverlay').style.display = 'none';
  openSummary();
}

function getApiKey() {
  return localStorage.getItem('anthropic_api_key') || '';
}

// 初回起動時にAPIキー未設定なら入力を促す
window.addEventListener('load', () => {
  if (!localStorage.getItem('anthropic_api_key')) {
    document.getElementById('apiModalOverlay').style.display = 'flex';
  }
});

const FONT_SIZES = [16, 20, 24, 30, 36, 44];
const FONT_LABELS = ['極小','小','中','大','特大','最大'];
let fontIndex = 3;
document.documentElement.style.setProperty('--font-size', FONT_SIZES[fontIndex] + 'px');

function changeFontSize(delta) {
  fontIndex = Math.max(0, Math.min(FONT_SIZES.length - 1, fontIndex + delta));
  document.documentElement.style.setProperty('--font-size', FONT_SIZES[fontIndex] + 'px');
  document.getElementById('fontSizeLabel').textContent = FONT_LABELS[fontIndex];
}

let recognition = null;
let isRecording = false;
let finalText = '';

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  document.getElementById('textArea').innerHTML = '<div class="placeholder">⚠️ このブラウザは音声認識非対応<br><br>Chrome または Safari をお使いください</div>';
  document.getElementById('btnRecord').disabled = true;
}

function toggleRecording() {
  if (!SpeechRecognition) return;
  isRecording ? stopRecording() : startRecording();
}

let scrollInterval = null;

function startRecording() {
  recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('btnRecord').classList.add('recording');
    document.getElementById('btnIcon').textContent = '⏹';
    document.getElementById('btnLabel').textContent = '録音停止';
    document.getElementById('statusDot').classList.add('live');
    const ph = document.getElementById('placeholder');
    if (ph) ph.style.display = 'none';
    // 手動スクロール中は自動スクロールを3秒停止
    const area = document.getElementById('textArea');
    let userScrolling = false;
    let userScrollTimer = null;
    area.addEventListener('wheel', () => {
      userScrolling = true;
      clearTimeout(userScrollTimer);
      userScrollTimer = setTimeout(() => { userScrolling = false; }, 3000);
    });
    area.addEventListener('touchmove', () => {
      userScrolling = true;
      clearTimeout(userScrollTimer);
      userScrollTimer = setTimeout(() => { userScrolling = false; }, 3000);
    });
    scrollInterval = setInterval(() => {
      if (userScrolling) return;
      area.scrollTop = area.scrollHeight;
    }, 200);
  };

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        const t = e.results[i][0].transcript.trim();
        if (t) {
          // 句点・感嘆符・疑問符の後に改行（Safari対応）
          finalText += t.replace(/。/g, '。\n').replace(/！/g, '！\n').replace(/？/g, '？\n') + '\n';
        }
      }
      else interim += e.results[i][0].transcript;
    }
    renderText(interim);
  };

  recognition.onerror = (e) => { if (e.error !== 'aborted') console.error(e.error); };
  recognition.onend = () => { if (isRecording) recognition.start(); };
  recognition.start();
}

function stopRecording() {
  isRecording = false;
  if (scrollInterval) { clearInterval(scrollInterval); scrollInterval = null; }
  if (recognition) recognition.stop();
  document.getElementById('btnRecord').classList.remove('recording');
  document.getElementById('btnIcon').textContent = '🎙️';
  document.getElementById('btnLabel').textContent = '録音開始';
  document.getElementById('statusDot').classList.remove('live');
  renderText('');
}

function renderText(interim) {
  const area = document.getElementById('textArea');
  area.innerHTML = '';
  if (finalText) {
    const s = document.createElement('span');
    s.style.whiteSpace = 'pre-wrap';
    s.textContent = finalText;
    area.appendChild(s);
  }
  if (interim) {
    const s = document.createElement('span');
    s.className = 'interim';
    s.textContent = interim;
    area.appendChild(s);
  }
  if (!finalText && !interim) {
    area.innerHTML = '<div class="placeholder" id="placeholder">録音開始を押して<br>話しかけてください</div>';
  }
  // 描画後にスクロール
  if (isRecording) {
    setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
  }
}

function clearText() {
  if (!confirm('クリアしますか？')) return;
  finalText = '';
  renderText('');
}

function copyText() {
  if (!finalText.trim()) { alert('コピーする文章がありません'); return; }
  const prefix = '以下の文章を要約してください。\n\n';
  const textToCopy = prefix + finalText;
  navigator.clipboard.writeText(textToCopy).then(() => alert('コピーしました！\n（先頭に「要約してください」が自動で追加されています）')).catch(() => prompt('コピーしてください：', textToCopy));
}

async function openSummary() {
  if (!finalText.trim()) { alert('録音してから要約ボタンを押してください'); return; }
  if (!getApiKey()) {
    document.getElementById('apiModalOverlay').style.display = 'flex';
    return;
  }

  document.getElementById('modalBody').innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div><p style="text-align:center;color:var(--text-dim);font-size:13px;margin-top:8px">AIが要約しています…</p>';
  document.getElementById('modalOverlay').classList.add('open');

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': getApiKey(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: '以下は音声文字変換された会話内容です。耳の不自由な方に見せるために、以下の形式でわかりやすく要約してください。\n\n【形式】\n・各ポイントは必ず改行して1行ずつ書く\n・重要なポイントを3〜5点、箇条書きで\n・各項目の先頭に「▸ 」をつける\n・項目と項目の間は1行あける\n・難しい言葉は使わず、シンプルな日本語で\n\n【会話内容】\n' + finalText
        }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API Error ' + response.status);
    }

    const data = await response.json();
    const summary = data.content[0].text;
    const items = summary.match(/^[▸・\-]\s*.+$/gm) || [];
    if (items.length > 0) {
      const html = '<div style="background:#13131a;border-radius:16px;padding:20px">'
        + items.map(line => {
            const text = line.replace(/^[▸・\-]\s*/, '').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            return '<div style="display:flex;gap:14px;align-items:flex-start;padding:10px 0">'
              + '<div style="width:8px;height:8px;border-radius:50%;background:#f0f0f5;flex-shrink:0;margin-top:9px"></div>'
              + '<div style="font-size:18px;line-height:1.7;color:#f0f0f5">' + text + '</div>'
              + '</div>';
          }).join('')
        + '</div>';
      document.getElementById('modalBody').innerHTML = html;
    } else {
      document.getElementById('modalBody').innerHTML = summary.replace(/\n/g, '<br>');
    }
  } catch (err) {
    document.getElementById('modalBody').innerHTML = '<p style="color:var(--danger)">❌ エラー: ' + err.message + '</p>';
  }
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

// ===== 履歴機能 =====
let currentSummaryText = '';
let currentSummaryHTML = '';

function saveSummary() {
  const body = document.getElementById('modalBody');
  const text = body.innerText;
  if (!text.trim() || text.includes('AIが要約しています')) return;
  pendingSaveType = 'summary';
  document.getElementById('titleModalHeading').textContent = '💾 要約を保存';
  document.getElementById('titleInput').value = '';
  document.getElementById('titleModalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('titleInput').focus(), 100);
}

// ===== 文字起こし保存 =====
let pendingSaveType = ''; // 'transcript' or 'summary'

function saveTranscript() {
  if (!finalText.trim()) { alert('保存する文章がありません'); return; }
  pendingSaveType = 'transcript';
  document.getElementById('titleModalHeading').textContent = '💾 文字起こしを保存';
  document.getElementById('titleInput').value = '';
  document.getElementById('titleModalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('titleInput').focus(), 100);
  document.getElementById('titleInput').onkeydown = (e) => { if (e.key === 'Enter') confirmSave(); };
}

function closeTitleModal() {
  document.getElementById('titleModalOverlay').classList.remove('open');
  pendingSaveType = '';
}

function confirmSave() {
  const title = document.getElementById('titleInput').value.trim();
  document.getElementById('titleModalOverlay').classList.remove('open');

  if (pendingSaveType === 'transcript') {
    const history = JSON.parse(localStorage.getItem('transcript_history') || '[]');
    const now = new Date();
    const dateStr = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 '
      + now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
    history.unshift({ date: dateStr, title: title, text: finalText, id: Date.now() });
    if (history.length > 200) history.pop();
    localStorage.setItem('transcript_history', JSON.stringify(history));
    const btn = document.getElementById('btnSaveTranscript');
    btn.textContent = '✅ 保存';
    setTimeout(() => { btn.textContent = '💾 保存'; }, 2000);
  } else if (pendingSaveType === 'summary') {
    const body = document.getElementById('modalBody');
    const html = body.innerHTML;
    const text = body.innerText;
    if (!text.trim()) return;
    const history = JSON.parse(localStorage.getItem('summary_history') || '[]');
    const now = new Date();
    const dateStr = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 '
      + now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
    history.unshift({ date: dateStr, title: title, html: html, text: text, id: Date.now() });
    if (history.length > 200) history.pop();
    localStorage.setItem('summary_history', JSON.stringify(history));
    const btn = document.getElementById('btnSaveSummary');
    btn.textContent = '✅ 保存しました';
    setTimeout(() => { btn.textContent = '💾 保存'; }, 2000);
  }
  pendingSaveType = '';
}

let currentTab = 'transcript';

function switchTab(tab) {
  currentTab = tab;
  const tBtn = document.getElementById('tabTranscript');
  const sBtn = document.getElementById('tabSummary');
  if (tab === 'transcript') {
    tBtn.style.color = '#00e5ff'; tBtn.style.borderBottom = '2px solid #00e5ff'; tBtn.style.fontWeight = '700';
    sBtn.style.color = '#5a5a7a'; sBtn.style.borderBottom = 'none'; sBtn.style.fontWeight = '400';
  } else {
    sBtn.style.color = '#00e5ff'; sBtn.style.borderBottom = '2px solid #00e5ff'; sBtn.style.fontWeight = '700';
    tBtn.style.color = '#5a5a7a'; tBtn.style.borderBottom = 'none'; tBtn.style.fontWeight = '400';
  }
  renderHistoryList();
}

function renderHistoryList() {
  const storageKey = currentTab === 'transcript' ? 'transcript_history' : 'summary_history';
  const history = JSON.parse(localStorage.getItem(storageKey) || '[]');
  const emptyMsg = currentTab === 'transcript'
    ? 'まだ保存された文字起こしがありません。<br><br>文字起こし後に「💾 保存」を押すと<br>ここに記録されます。'
    : 'まだ保存された要約がありません。<br><br>要約後に「💾 保存」を押すと<br>ここに記録されます。';

  const body = document.getElementById('historyBody');

  if (history.length === 0) {
    body.innerHTML = '<div class="history-empty">' + emptyMsg + '</div>';
    return;
  }

  const openFn = currentTab === 'transcript' ? 'openTranscriptDetail' : 'openHistoryDetail';

  body.innerHTML = `
    <div class="history-toolbar">
      <button class="btn-delete-selected" onclick="deleteSelected('${storageKey}')">🗑 選択削除</button>
      <button class="btn-delete-all" onclick="deleteAll('${storageKey}')">⚠ 全削除</button>
    </div>
  ` + history.map(item => `
    <div class="history-item" id="item-${item.id}">
      <input type="checkbox" id="chk-${item.id}" onclick="event.stopPropagation()" onchange="updateItemStyle(${item.id})">
      <div class="history-item-content" onclick="${openFn}(${item.id})">
        <div class="history-item-date">📅 ${item.date}${item.title ? ' ／ <strong>' + item.title + '</strong>' : ''}</div>
        <div class="history-item-preview">${item.text.substring(0,60).replace(/\n/g,' ')}…</div>
      </div>
    </div>
  `).join('');
}

function updateItemStyle(id) {
  const chk = document.getElementById('chk-' + id);
  const item = document.getElementById('item-' + id);
  item.classList.toggle('selected', chk.checked);
}

function toggleSelectAll(storageKey) {
  const history = JSON.parse(localStorage.getItem(storageKey) || '[]');
  const checkboxes = history.map(item => document.getElementById('chk-' + item.id)).filter(Boolean);
  const allChecked = checkboxes.every(c => c.checked);
  checkboxes.forEach(c => {
    c.checked = !allChecked;
    const item = document.getElementById('item-' + c.id.replace('chk-',''));
    if (item) item.classList.toggle('selected', c.checked);
  });
}

function deleteSelected(storageKey) {
  const history = JSON.parse(localStorage.getItem(storageKey) || '[]');
  const selected = history.filter(item => {
    const chk = document.getElementById('chk-' + item.id);
    return chk && chk.checked;
  });
  if (selected.length === 0) { alert('削除する項目を選択してください'); return; }
  if (!confirm(selected.length + '件を削除しますか？')) return;
  const remaining = history.filter(item => {
    const chk = document.getElementById('chk-' + item.id);
    return !(chk && chk.checked);
  });
  localStorage.setItem(storageKey, JSON.stringify(remaining));
  renderHistoryList();
}

function deleteAll(storageKey) {
  const history = JSON.parse(localStorage.getItem(storageKey) || '[]');
  if (history.length === 0) return;
  if (!confirm('全' + history.length + '件を削除しますか？\nこの操作は元に戻せません。')) return;
  localStorage.setItem(storageKey, JSON.stringify([]));
  renderHistoryList();
}

function openTranscriptDetail(id) {
  const history = JSON.parse(localStorage.getItem('transcript_history') || '[]');
  const item = history.find(h => h.id === id);
  if (!item) return;
  currentSummaryText = item.text;
  currentSummaryHTML = '<pre style="white-space:pre-wrap;font-family:inherit;font-size:15px;line-height:1.8">' + item.text + '</pre>';
  document.getElementById('historyDetailDate').textContent = '📅 ' + item.date;
  document.getElementById('historyDetailBody').innerHTML = currentSummaryHTML;
  document.getElementById('historyDetailOverlay').classList.add('open');
}

function deleteTranscript(id) {
  if (!confirm('この文字起こしを削除しますか？')) return;
  let history = JSON.parse(localStorage.getItem('transcript_history') || '[]');
  history = history.filter(h => h.id !== id);
  localStorage.setItem('transcript_history', JSON.stringify(history));
  renderHistoryList();
}

function openHistory() {
  currentTab = 'transcript';
  switchTab('transcript');
  document.getElementById('historyOverlay').classList.add('open');
}

function closeHistory() {
  document.getElementById('historyOverlay').classList.remove('open');
}

function openHistoryDetail(id) {
  const history = JSON.parse(localStorage.getItem('summary_history') || '[]');
  const item = history.find(h => h.id === id);
  if (!item) return;
  document.getElementById('historyDetailDate').textContent = '📅 ' + item.date;
  document.getElementById('historyDetailBody').innerHTML = item.html;
  currentSummaryText = item.text;
  currentSummaryHTML = item.html;
  document.getElementById('historyDetailOverlay').classList.add('open');
}

function closeHistoryDetail() {
  document.getElementById('historyDetailOverlay').classList.remove('open');
}

function deleteHistory(id) {
  if (!confirm('この要約を削除しますか？')) return;
  let history = JSON.parse(localStorage.getItem('summary_history') || '[]');
  history = history.filter(h => h.id !== id);
  localStorage.setItem('summary_history', JSON.stringify(history));
  openHistory(); // 一覧を更新
}

function copyHistoryDetail() {
  navigator.clipboard.writeText(currentSummaryText).then(() => alert('コピーしました！')).catch(() => prompt('コピーしてください：', currentSummaryText));
}

function printHistoryDetail() {
  const w = window.open('', '_blank');
  w.document.write('<html><head><title>会話要約</title><meta charset="UTF-8"><style>body{font-family:sans-serif;padding:32px;font-size:16px;line-height:1.8}</style></head><body>' + currentSummaryHTML + '</body></html>');
  w.document.close(); w.print();
}

function copySummary() {
  const body = document.getElementById('modalBody');
  const text = body.innerText;
  if (!text.trim()) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btnCopySummary');
    btn.textContent = '✅ コピーしました';
    setTimeout(() => { btn.textContent = '📋 コピー'; }, 2000);
  }).catch(() => prompt('コピーしてください：', text));
}

function printSummary() {
  const w = window.open('', '_blank');
  const printStyle = '<style>body{font-family:"Noto Sans JP",sans-serif;padding:40px;background:#fff;color:#222}div{font-size:16px;line-height:1.7}strong{font-weight:700;color:#222}[style*="border-radius:16px"]{background:#fff!important;padding:0!important}[style*="border-radius:50%"]{background:#222!important}</style>';
  w.document.write('<html><head><title>会話要約</title><meta charset="UTF-8">' + printStyle + '</head><body>' + document.getElementById('modalBody').innerHTML + '</body></html>');
  w.document.close(); w.print();
}
</script>
