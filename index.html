<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>声文字 - 音声文字変換</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Appleベースのカラーパレット */
    --bg: #000000;
    --surface: rgba(22, 22, 23, 0.8);
    --surface-modal: #1c1c1e;
    --border: rgba(255, 255, 255, 0.15);
    --accent: #0071e3; /* Apple Link Blue */
    --accent-tap: #0077ed;
    --text: #f5f5f7;
    --text-dim: #86868b;
    --danger: #ff453a; /* iOS Apple Red */
  }
  
  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent; 
  }
  
  body {
    background: var(--bg);
    color: var(--text);
    /* Apple標準のシステムフォント指定 */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", sans-serif;
    height: 100dvh;
    max-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    letter-spacing: -0.02em;
  }
  
  header {
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    flex-shrink: 0;
    z-index: 10;
  }
  
  .logo { 
    font-weight: 600;
    font-size: 17px; 
    color: var(--text); 
    letter-spacing: -0.03em; 
  }
  .logo span { 
    color: var(--text-dim); 
    font-size: 11px; 
    margin-left: 6px; 
    font-weight: 400; 
  }
  
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); transition: all 0.3s; }
  .status-dot.live { background: var(--danger); box-shadow: 0 0 10px var(--danger); animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  
  .font-size-control { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-dim); }
  .font-size-control button {
    background: transparent; border: none; color: var(--accent);
    width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .font-size-control button:active {
    background: rgba(255, 255, 255, 0.1);
  }
  #fontSizeLabel { min-width: 24px; text-align: center; font-weight: 500; }
  
  .text-area {
    flex: 1;
    overflow-y: scroll;
    -webkit-overflow-scrolling: touch;
    padding: 32px 24px;
    font-size: var(--font-size, 24px);
    font-weight: 400;
    line-height: 1.6;
    color: var(--text);
    word-break: break-word;
    white-space: pre-wrap;
    overscroll-behavior: contain;
  }
  
  .placeholder { 
    color: var(--text-dim); 
    font-size: 17px; 
    font-weight: 400; 
    text-align: center; 
    margin-top: 60px; 
    line-height: 1.6; 
  }
  .interim { color: var(--text-dim); }
  
  .controls {
    padding: 16px 24px 28px;
    display: flex; flex-direction: column; gap: 14px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    flex-shrink: 0;
    z-index: 10;
  }
  
  /* Appleらしい美しい丸みのあるメインボタン */
  .btn-record {
    width: 100%; padding: 16px; border: none; border-radius: 980px;
    font-size: 16px; font-weight: 500;
    font-family: inherit;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    gap: 8px; transition: all 0.2s ease; background: var(--accent); color: #fff;
  }
  .btn-record:hover { background: var(--accent-tap); }
  .btn-record.recording { background: var(--danger); color: #fff; animation: rec-pulse 1.8s infinite; }
  @keyframes rec-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,69,58,0.4)} 50%{box-shadow:0 0 0 8px rgba(255,69,58,0)} }
  .btn-record:active { transform: scale(0.98); opacity: 0.9; }
  
  .sub-controls { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
  /* スクロールバー非表示（iOSライクに） */
  .sub-controls::-webkit-scrollbar { display: none; }
  
  .btn-sub {
    flex: 1; min-width: 76px; padding: 10px 4px; border: none; border-radius: 8px;
    background: rgba(255, 255, 255, 0.08); color: var(--accent); font-size: 13px; font-weight: 500;
    font-family: inherit; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: background 0.2s;
  }
  .btn-sub:active { background: rgba(255, 255, 255, 0.15); }
  .btn-sub.highlight { background: rgba(0, 113, 227, 0.15); color: #2997ff; }
  .btn-sub.highlight:active { background: rgba(0, 113, 227, 0.25); }
  
  /* モーダル・シートデザイン */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100;
    display: none; align-items: flex-end; justify-content: center;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }
  .modal-overlay.open { display: flex; }
  
  .modal {
    background: var(--surface-modal); border-radius: 20px 20px 0 0;
    width: 100%; max-width: 640px; max-height: 85dvh;
    display: flex; flex-direction: column; animation: slide-up 0.4s cubic-bezier(0.25, 1, 0.5, 1);
  }
  @keyframes slide-up { from{transform:translateY(100%)} to{transform:translateY(0)} }
  
  .modal-header {
    padding: 20px 24px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
  }
  .modal-title { font-size: 17px; font-weight: 600; color: var(--text); }
  
  /* 円形のクローズボタン */
  .modal-close { 
    background: rgba(255,255,255,0.1); border: none; color: var(--text-dim); 
    width: 28px; height: 28px; border-radius: 50%; font-size: 14px; cursor: pointer; 
    display: flex; align-items: center; justify-content: center; transition: background 0.2s;
  }
  .modal-close:active { background: rgba(255,255,255,0.2); }
  
  .modal-body { flex: 1; overflow-y: auto; padding: 24px; font-size: 16px; line-height: 1.6; color: var(--text); -webkit-overflow-scrolling: touch; }
  
  .modal-footer { padding: 16px 24px 34px; display: flex; gap: 12px; border-top: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; }
  .modal-footer button { 
    flex: 1; padding: 14px; border-radius: 12px; font-size: 15px; font-family: inherit; 
    cursor: pointer; border: none; font-weight: 500; transition: opacity 0.2s; 
  }
  .modal-footer button:active { opacity: 0.8; }
  .btn-print { background: rgba(255,255,255,0.08); color: var(--text); }
  .btn-save-summary { background: var(--accent); color: #fff; }
  
  /* 履歴等共通スタイル */
  .history-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 150;
    display: none; align-items: flex-end; justify-content: center;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }
  .history-overlay.open { display: flex; }
  .history-modal {
    background: var(--surface-modal); border-radius: 20px 20px 0 0;
    width: 100%; max-width: 640px; max-height: 85dvh;
    display: flex; flex-direction: column; animation: slide-up 0.4s cubic-bezier(0.25, 1, 0.5, 1);
  }
  .history-header {
    padding: 20px 24px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
  }
  .history-title { font-size: 17px; font-weight: 600; color: var(--text); }
  .history-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .history-empty { text-align: center; padding: 60px 24px; color: var(--text-dim); font-size: 15px; line-height: 1.6; }
  
  .history-toolbar {
    display: flex; gap: 10px; padding: 12px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
  }
  .history-toolbar button {
    padding: 8px 14px; border-radius: 8px; border: none; font-size: 13px;
    font-family: inherit; cursor: pointer; font-weight: 500;
  }
  .btn-delete-selected { background: rgba(255, 69, 58, 0.15); color: var(--danger); }
  .btn-delete-all { background: transparent; color: var(--danger); margin-left: auto; }
  
  .history-item { 
    position: relative; display: flex; align-items: center; gap: 16px; 
    border-bottom: 1px solid rgba(255,255,255,0.04); padding: 16px 24px; cursor: pointer;
    transition: background 0.2s;
  }
  .history-item:active { background: rgba(255,255,255,0.04); }
  .history-item input[type=checkbox] {
    width: 20px; height: 20px; flex-shrink: 0;
    accent-color: var(--accent); cursor: pointer;
    border-radius: 4px;
  }
  .history-item-content { flex: 1; min-width: 0; }
  .history-item.selected { background: rgba(0, 113, 227, 0.05); }
  .history-item-date { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  
  .history-detail-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200;
    display: none; align-items: flex-end; justify-content: center;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }
  .history-detail-overlay.open { display: flex; }
  .history-detail-modal {
    background: var(--surface-modal); border-radius: 20px 20px 0 0;
    width: 100%; max-width: 640px; max-height: 85dvh;
    display: flex; flex-direction: column; animation: slide-up 0.4s cubic-bezier(0.25, 1, 0.5, 1);
  }
  
  /* ダイアログ（アラートポップアップ）スタイル */
  .title-modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300;
    display: none; align-items: center; justify-content: center; padding: 24px;
    backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
  }
  .title-modal-overlay.open { display: flex; }
  .title-modal {
    background: #2c2c2e; border-radius: 14px;
    width: 100%; max-width: 270px; padding: 20px; text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  .title-modal h3 { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .title-modal p { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; }
  .title-modal input {
    width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; padding: 8px 12px; color: var(--text); font-size: 14px;
    font-family: inherit; margin-bottom: 16px;
  }
  .title-modal input:focus { outline: none; border-color: var(--accent); }
  
  /* iOSスタイルの横並びボーダーラインボタン */
  .title-modal-btns { display: flex; border-top: 1px solid rgba(255,255,255,0.15); margin: 0 -20px -20px -20px; }
  .title-modal-btns button {
    flex: 1; padding: 12px; border: none; background: transparent; font-size: 17px;
    font-family: inherit; cursor: pointer; color: var(--accent);
  }
  .title-modal-btns button:first-child {
    border-right: 1px solid rgba(255,255,255,0.15);
  }
  .btn-title-save { font-weight: 600 !important; }
  .btn-title-cancel { color: var(--accent) !important; font-weight: 400; }
  
  .loading-dots { display: flex; gap: 6px; justify-content: center; padding: 20px; }
  .loading-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); animation: dot-bounce 1.4s infinite both; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot-bounce { 0%,80%,100%{transform:scale(0.8);opacity:0.2} 40%{transform:scale(1);opacity:1} }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">声文字<span>音声文字変換</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="font-size-control">
      <button onclick="changeFontSize(-1)">A</button>
      <span id="fontSizeLabel">大</span>
      <button onclick="changeFontSize(1)">A</button>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>
</header>

<div class="text-area" id="textArea">
  <div class="placeholder" id="placeholder">録音を開始して<br>話しかけてください</div>
</div>

<div class="controls">
  <button class="btn-record" id="btnRecord" onclick="toggleRecording()">
    <span id="btnIcon">●</span>
    <span id="btnLabel">録音開始</span>
  </button>
  <div class="sub-controls">
    <button class="btn-sub highlight" onclick="copyText()">コピー</button>
    <button class="btn-sub highlight" onclick="copyTextMeeting()">議事録</button>
    <button class="btn-sub highlight" onclick="saveTranscript()" id="btnSaveTranscript">保存</button>
    <button class="btn-sub" onclick="clearText()">クリア</button>
    <button class="btn-sub highlight" onclick="openHistory()">履歴</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">会話の要約</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
    <div class="modal-footer">
      <button class="btn-save-summary" onclick="saveSummary()" id="btnSaveSummary">保存</button>
      <button class="btn-print" onclick="copySummary()" id="btnCopySummary">コピー</button>
      <button class="btn-print" onclick="printSummary()">印刷</button>
    </div>
  </div>
</div>

<div class="history-overlay" id="historyOverlay">
  <div class="history-modal">
    <div class="history-header">
      <div class="history-title">履歴</div>
      <button class="modal-close" onclick="closeHistory()">✕</button>
    </div>
    <div class="history-body" id="historyBody"></div>
  </div>
</div>

<div class="history-detail-overlay" id="historyDetailOverlay">
  <div class="history-detail-modal">
    <div class="modal-header">
      <div class="modal-title" id="historyDetailDate"></div>
      <button class="modal-close" onclick="closeHistoryDetail()">✕</button>
    </div>
    <div class="modal-body" id="historyDetailBody"></div>
    <div class="modal-footer">
      <button class="btn-print" onclick="copyHistoryDetail()">コピー</button>
      <button class="btn-print" onclick="copyHistoryDetailMeeting()">議事録</button>
      <button class="btn-print" onclick="printHistoryDetail()">印刷</button>
    </div>
  </div>
</div>

<div class="api-modal-overlay" id="apiModalOverlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:400;display:none;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);">
  <div style="background:#2c2c2e;border-radius:14px;width:100%;max-width:280px;padding:20px;text-align:center;">
    <h2 style="font-size:17px;color:#fff;margin-bottom:4px;font-weight:600">APIキーを設定</h2>
    <p style="font-size:13px;color:var(--text-dim);margin-bottom:16px;line-height:1.4">要約機能を使うにはAnthropicのAPIキーが必要です。</p>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." autocomplete="off"
      style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:8px 12px;color:#fff;font-size:13px;font-family:monospace;margin-bottom:16px;outline:none;">
    <div style="display:flex;border-top:1px solid rgba(255,255,255,0.15);margin:0 -20px -20px -20px">
      <button onclick="saveApiKey()" style="width:100%;padding:12px;background:transparent;color:var(--accent);border:none;font-size:17px;font-weight:600;cursor:pointer">保存して要約</button>
    </div>
  </div>
</div>

<div class="title-modal-overlay" id="titleModalOverlay">
  <div class="title-modal">
    <h3 id="titleModalHeading">タイトルをつけて保存</h3>
    <p>省略するとタイトルなしで保存されます</p>
    <input type="text" id="titleInput" placeholder="例：打ち合わせ" maxlength="30">
    <div class="title-modal-btns">
      <button class="btn-title-cancel" onclick="closeTitleModal()">キャンセル</button>
      <button class="btn-title-save" onclick="confirmSave()">保存</button>
    </div>
  </div>
</div>

<script>
/* JavaScriptロジックは元の処理を完全に維持 */
function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key || !key.startsWith('sk-')) {
    alert('正しいAPIキーを入力してください（sk- から始まります）');
    return;
  }
  localStorage.setItem('anthropic_api_key', key);
  document.getElementById('apiModalOverlay').style.display = 'none';
  openSummary();
}

function getApiKey() {
  return localStorage.getItem('anthropic_api_key') || '';
}

window.addEventListener('load', () => {});

const FONT_SIZES = [16, 20, 24, 30, 36, 44];
const FONT_LABELS = ['極小','小','中','大','特大','最大'];
let fontIndex = 3;
document.documentElement.style.setProperty('--font-size', FONT_SIZES[fontIndex] + 'px');

function changeFontSize(delta) {
  fontIndex = Math.max(0, Math.min(FONT_SIZES.length - 1, fontIndex + delta));
  document.documentElement.style.setProperty('--font-size', FONT_SIZES[fontIndex] + 'px');
  document.getElementById('fontSizeLabel').textContent = FONT_LABELS[fontIndex];
}

let recognition = null;
let isRecording = false;
let finalText = '';

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  document.getElementById('textArea').innerHTML = '<div class="placeholder">⚠️ このブラウザは音声認識非対応<br><br>Chrome または Safari をお使いください</div>';
  document.getElementById('btnRecord').disabled = true;
}

function toggleRecording() {
  if (!SpeechRecognition) return;
  isRecording ? stopRecording() : startRecording();
}

let scrollInterval = null;

function startRecording() {
  recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('btnRecord').classList.add('recording');
    document.getElementById('btnIcon').textContent = '■';
    document.getElementById('btnLabel').textContent = '録音停止';
    document.getElementById('statusDot').classList.add('live');
    const ph = document.getElementById('placeholder');
    if (ph) ph.style.display = 'none';
    const area = document.getElementById('textArea');
    let userScrolling = false;
    let userScrollTimer = null;
    area.addEventListener('wheel', () => {
      userScrolling = true;
      clearTimeout(userScrollTimer);
      userScrollTimer = setTimeout(() => { userScrolling = false; }, 3000);
    });
    area.addEventListener('touchmove', () => {
      userScrolling = true;
      clearTimeout(userScrollTimer);
      userScrollTimer = setTimeout(() => { userScrolling = false; }, 3000);
    });
    scrollInterval = setInterval(() => {
      if (userScrolling) return;
      area.scrollTop = area.scrollHeight;
    }, 200);
  };

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        const t = e.results[i][0].transcript.trim();
        if (t) {
          finalText += t.replace(/。/g, '。\n').replace(/！/g, '！\n').replace(/？/g, '？\n') + '\n';
        }
      }
      else interim += e.results[i][0].transcript;
    }
    renderText(interim);
  };

  recognition.onerror = (e) => { if (e.error !== 'aborted') console.error(e.error); };
  recognition.onend = () => { if (isRecording) recognition.start(); };
  recognition.start();
}

function stopRecording() {
  isRecording = false;
  if (scrollInterval) { clearInterval(scrollInterval); scrollInterval = null; }
  if (recognition) recognition.stop();
  document.getElementById('btnRecord').classList.remove('recording');
  document.getElementById('btnIcon').textContent = '●';
  document.getElementById('btnLabel').textContent = '録音開始';
  document.getElementById('statusDot').classList.remove('live');
  renderText('');
}

function renderText(interim) {
  const area = document.getElementById('textArea');
  area.innerHTML = '';
  if (finalText) {
    const s = document.createElement('span');
    s.style.whiteSpace = 'pre-wrap';
    s.textContent = finalText;
    area.appendChild(s);
  }
  if (interim) {
    const s = document.createElement('span');
    s.className = 'interim';
    s.textContent = interim;
    area.appendChild(s);
  }
  if (!finalText && !interim) {
    area.innerHTML = '<div class="placeholder" id="placeholder">録音を開始して<br>話しかけてください</div>';
  }
  if (isRecording) {
    setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
  }
}

function clearText() {
  if (!confirm('クリアしますか？')) return;
  finalText = '';
  renderText('');
}

const MEETING_PROMPT = `以下は会議の音声文字起こしです。以下の項目を必ず含めて要約してください。

【決定事項】
・何が決まったか

【タスク・依頼】
・誰が・何を・いつまでに

【次回の約束・期限】
・日付や締め切りが出てきたものをすべて

【未解決の問題】
・結論が出なかった課題

【確認事項】
・後で確認が必要なこと

【次回の議題】
・次回話し合う予定のこと

【問題・困っていること】
・メンバーが抱えている問題や困りごと

【その他の重要事項】
・見落としてはいけないこと

【会議内容】
`;

function copyText() {
  if (!finalText.trim()) { alert('コピーする文章がありません'); return; }
  navigator.clipboard.writeText(finalText).then(() => alert('コピーしました！')).catch(() => prompt('コピーしてください：', finalText));
}

function copyTextMeeting() {
  if (!finalText.trim()) { alert('コピーする文章がありません'); return; }
  const now = new Date();
  const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
  const dateStr = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日（' + weekdays[now.getDay()] + '）';
  const datePrompt = `この会議は${dateStr}に行われました。「今日」「明日」「来週」「今週中」などの相対的な表現は、基準日から各曜日までの日数を計算してから「○月○日（曜日）」の形式で具体的な日付に変換してください。\n\n作業予定表の画像が添付されている場合は、誰がどのタスク番号を担当しているかの参照用として使ってください。予定表の内容そのものは要約せず、会議の文字起こしの要約に担当者とタスク情報を補完するためだけに活用してください。\n\nマークダウン形式で出力してください。\n\n`;
  const textToCopy = datePrompt + MEETING_PROMPT + finalText;
  navigator.clipboard.writeText(textToCopy).then(() => alert('議事録用にコピーしました！')).catch(() => prompt('コピーしてください：', textToCopy));
}

async function openSummary() {
  if (!finalText.trim()) { alert('録音してから要約ボタンを押してください'); return; }
  if (!getApiKey()) {
    document.getElementById('apiModalOverlay').style.display = 'flex';
    return;
  }

  document.getElementById('modalBody').innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div><p style="text-align:center;color:var(--text-dim);font-size:13px;margin-top:8px">AIが要約しています…</p>';
  document.getElementById('modalOverlay').classList.add('open');

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': getApiKey(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: '以下は音声文字変換された会話内容です。耳の不自由な方に見せるために、以下の形式でわかりやすく要約してください。\n\n【形式】\n・各ポイントは必ず改行して1行ずつ書く\n・重要なポイントを3〜5点、箇条書きで\n・各項目の先頭に「▸ 」をつける\n・項目と項目の間は1行あける\n・難しい言葉は使わず、シンプルな日本語で\n\n【会話内容】\n' + finalText
        }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API Error ' + response.status);
    }

    const data = await response.json();
    const summary = data.content[0].text;
    const items = summary.match(/^[▸・\-]\s*.+$/gm) || [];
    if (items.length > 0) {
      const html = '<div style="background:rgba(255,255,255,0.03);border-radius:12px;padding:16px">'
        + items.map(line => {
            const text = line.replace(/^[▸・\-]\s*/, '').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            return '<div style="display:flex;gap:12px;align-items:flex-start;padding:8px 0">'
              + '<div style="width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:9px"></div>'
              + '<div style="font-size:16px;line-height:1.6;color:var(--text)">' + text + '</div>'
              + '</div>';
          }).join('')
        + '</div>';
      document.getElementById('modalBody').innerHTML = html;
    } else {
      document.getElementById('modalBody').innerHTML = summary.replace(/\n/g, '<br>');
    }
  } catch (err) {
    document.getElementById('modalBody').innerHTML = '<p style="color:var(--danger)">❌ エラー: ' + err.message + '</p>';
  }
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

let currentSummaryText = '';
let currentSummaryHTML = '';

function saveSummary() {
  const body = document.getElementById('modalBody');
  const text = body.innerText;
  if (!text.trim() || text.includes('AIが要約しています')) return;
  pendingSaveType = 'summary';
  document.getElementById('titleModalHeading').textContent = '要約を保存';
  document.getElementById('titleInput').value = '';
  document.getElementById('titleModalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('titleInput').focus(), 100);
}

let pendingSaveType = '';

function saveTranscript() {
  if (!finalText.trim()) { alert('保存する文章がありません'); return; }
  pendingSaveType = 'transcript';
  document.getElementById('titleModalHeading').textContent = '文字起こしを保存';
  document.getElementById('titleInput').value = '';
  document.getElementById('titleModalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('titleInput').focus(), 100);
  document.getElementById('titleInput').onkeydown = (e) => { if (e.key === 'Enter') confirmSave(); };
}

function closeTitleModal() {
  document.getElementById('titleModalOverlay').classList.remove('open');
  pendingSaveType = '';
}

function confirmSave() {
  const title = document.getElementById('titleInput').value.trim();
  document.getElementById('titleModalOverlay').classList.remove('open');

  if (pendingSaveType === 'transcript') {
    const history = JSON.parse(localStorage.getItem('transcript_history') || '[]');
    const now = new Date();
    const dateStr = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 '
      + now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
    history.unshift({ date: dateStr, title: title, text: finalText, id: Date.now() });
    if (history.length > 200) history.pop();
    localStorage.setItem('transcript_history', JSON.stringify(history));
    const btn = document.getElementById('btnSaveTranscript');
    btn.textContent = '保存済み';
    setTimeout(() => { btn.textContent = '保存'; }, 2000);
  } else if (pendingSaveType === 'summary') {
    const body = document.getElementById('modalBody');
    const html = body.innerHTML;
    const text = body.innerText;
    if (!text.trim()) return;
    const history = JSON.parse(localStorage.getItem('summary_history') || '[]');
    const now = new Date();
    const dateStr = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 '
      + now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
    history.unshift({ date: dateStr, title: title, html: html, text: text, id: Date.now() });
    if (history.length > 200) history.pop();
    localStorage.setItem('summary_history', JSON.stringify(history));
    const btn = document.getElementById('btnSaveSummary');
    btn.textContent = '保存完了';
    setTimeout(() => { btn.textContent = '保存'; }, 2000);
  }
  pendingSaveType = '';
}

let currentTab = 'transcript';

function renderHistoryList() {
  const storageKey = 'transcript_history';
  const history = JSON.parse(localStorage.getItem(storageKey) || '[]');
  const emptyMsg = 'まだ保存された文字起こしがありません。<br><br>文字起こし後に「保存」を押すと<br>ここに記録されます。';

  const body = document.getElementById('historyBody');

  if (history.length === 0) {
    body.innerHTML = '<div class="history-empty">' + emptyMsg + '</div>';
    return;
  }

  const openFn = 'openTranscriptDetail';

  body.innerHTML = `
    <div class="history-toolbar">
      <button class="btn-delete-selected" onclick="deleteSelected('${storageKey}')">選択削除</button>
      <button class="btn-delete-all" onclick="deleteAll('${storageKey}')">全削除</button>
    </div>
  ` + history.map(item => `
    <div class="history-item" id="item-${item.id}">
      <input type="checkbox" id="chk-${item.id}" onclick="event.stopPropagation()" onchange="updateItemStyle(${item.id})">
      <div class="history-item-content" onclick="${openFn}(${item.id})">
        <div style="font-size:16px;font-weight:600;color:var(--text);line-height:1.4">${item.title || item.date}</div>
        ${item.title ? '<div style="font-size:12px;color:var(--text-dim);margin-top:2px">' + item.date + '</div>' : ''}
      </div>
    </div>
  `).join('');
}

function updateItemStyle(id) {
  const chk = document.getElementById('chk-' + id);
  const item = document.getElementById('item-' + id);
  item.classList.toggle('selected', chk.checked);
}

function toggleSelectAll(storageKey) {
  const history = JSON.parse(localStorage.getItem(storageKey) || '[]');
  const checkboxes = history.map(item => document.getElementById('chk-' + item.id)).filter(Boolean);
  const allChecked = checkboxes.every(c => c.checked);
  checkboxes.forEach(c => {
    c.checked = !allChecked;
    const item = document.getElementById('item-' + c.id.replace('chk-',''));
    if (item) item.classList.toggle('selected', c.checked);
  });
}

function deleteSelected(storageKey) {
  const history = JSON.parse(localStorage.getItem(storageKey) || '[]');
  const selected = history.filter(item => {
    const chk = document.getElementById('chk-' + item.id);
    return chk && chk.checked;
  });
  if (selected.length === 0) { alert('削除する項目を選択してください'); return; }
  if (!confirm(selected.length + '件を削除しますか？')) return;
  const remaining = history.filter(item => {
    const chk = document.getElementById('chk-' + item.id);
    return !(chk && chk.checked);
  });
  localStorage.setItem(storageKey, JSON.stringify(remaining));
  renderHistoryList();
}

function deleteAll(storageKey) {
  const history = JSON.parse(localStorage.getItem(storageKey) || '[]');
  if (history.length === 0) return;
  if (!confirm('全' + history.length + '件を削除しますか？\nこの操作は元に戻せません。')) return;
  localStorage.setItem(storageKey, JSON.stringify([]));
  renderHistoryList();
}

let currentSummaryDate = '';

function openTranscriptDetail(id) {
  const history = JSON.parse(localStorage.getItem('transcript_history') || '[]');
  const item = history.find(h => h.id === id);
  if (!item) return;
  currentSummaryText = item.text;
  currentSummaryDate = item.date;
  currentSummaryHTML = '<pre style="white-space:pre-wrap;font-family:inherit;font-size:15px;line-height:1.8">' + item.text + '</pre>';
  document.getElementById('historyDetailDate').textContent = item.date;
  document.getElementById('historyDetailBody').innerHTML = currentSummaryHTML;
  document.getElementById('historyDetailOverlay').classList.add('open');
}

function deleteTranscript(id) {
  if (!confirm('この文字起こしを削除しますか？')) return;
  let history = JSON.parse(localStorage.getItem('transcript_history') || '[]');
  history = history.filter(h => h.id !== id);
  localStorage.setItem('transcript_history', JSON.stringify(history));
  renderHistoryList();
}

function openHistory() {
  currentTab = 'transcript';
  renderHistoryList();
  document.getElementById('historyOverlay').classList.add('open');
}

function closeHistory() {
  document.getElementById('historyOverlay').classList.remove('open');
}

function openHistoryDetail(id) {
  const history = JSON.parse(localStorage.getItem('summary_history') || '[]');
  const item = history.find(h => h.id === id);
  if (!item) return;
  document.getElementById('historyDetailDate').textContent = item.date;
  document.getElementById('historyDetailBody').innerHTML = item.html;
  currentSummaryText = item.text;
  currentSummaryHTML = item.html;
  document.getElementById('historyDetailOverlay').classList.add('open');
}

function closeHistoryDetail() {
  document.getElementById('historyDetailOverlay').classList.remove('open');
}

function deleteHistory(id) {
  if (!confirm('この要約を削除しますか？')) return;
  let history = JSON.parse(localStorage.getItem('summary_history') || '[]');
  history = history.filter(h => h.id !== id);
  localStorage.setItem('summary_history', JSON.stringify(history));
  openHistory();
}

function copyHistoryDetail() {
  navigator.clipboard.writeText(currentSummaryText).then(() => alert('コピーしました！')).catch(() => prompt('コピーしてください：', currentSummaryText));
}

function copyHistoryDetailMeeting() {
  let dateStr = currentSummaryDate;
  try {
    const match = currentSummaryDate.match(/(\d+)年(\d+)月(\d+)日/);
    if (match) {
      const d = new Date(match[1], match[2]-1, match[3]);
      const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
      dateStr = match[1] + '年' + match[2] + '月' + match[3] + '日（' + weekdays[d.getDay()] + '）';
    }
  } catch(e) {}
  const datePrompt = `この会議は${dateStr}に行われました。「今日」「明日」「来週」「今週中」などの相対的な表現は、基準日から各曜日までの日数を計算してから「○月○日（曜日）」の形式で具体的な日付に変換してください。\n\n作業予定表の画像が添付されている場合は、誰がどのタスク番号を担当しているかの参照用として使ってください。予定表の内容そのものは要約せず、会議の文字起こしの要約に担当者とタスク情報を補完するためだけに活用してください。\n\nマークダウン形式で出力してください。\n\n`;
  const textToCopy = datePrompt + MEETING_PROMPT + currentSummaryText;
  navigator.clipboard.writeText(textToCopy).then(() => alert('議事録用にコピーしました！')).catch(() => prompt('コピーしてください：', textToCopy));
}

function printHistoryDetail() {
  const w = window.open('', '_blank');
  w.document.write('<html><head><title>会話要約</title><meta charset="UTF-8"><style>body{font-family:sans-serif;padding:32px;font-size:16px;line-height:1.8}</style></head><body>' + currentSummaryHTML + '</body></html>');
  w.document.close(); w.print();
}

function copySummary() {
  const body = document.getElementById('modalBody');
  const text = body.innerText;
  if (!text.trim()) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btnCopySummary');
    btn.textContent = 'コピー完了';
    setTimeout(() => { btn.textContent = 'コピー'; }, 2000);
  }).catch(() => prompt('コピーしてください：', text));
}

function printSummary() {
  const w = window.open('', '_blank');
  const printStyle = '<style>body{font-family:sans-serif;padding:40px;background:#fff;color:#222}div{font-size:16px;line-height:1.7}strong{font-weight:700;color:#222}[style*="border-radius:16px"]{background:#fff!important;padding:0!important}[style*="border-radius:50%"]{background:#222!important}</style>';
  w.document.write('<html><head><title>会話要約</title><meta charset="UTF-8">' + printStyle + '</head><body>' + document.getElementById('modalBody').innerHTML + '</body></html>');
  w.document.close(); w.print();
}
